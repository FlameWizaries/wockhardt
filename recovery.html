<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="shortcut icon" href="./img/twmm.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@200..800&family=Oswald:wght@200..700&family=Russo+One&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <style>
        .recovery-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 20px;
        }
        .recovery-container {
            width: 100%;
            max-width: 420px;
        }
        .recovery-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 35px;
            border: 1px solid rgba(143, 70, 255, 0.15);
            position: relative;
        }
        .recovery-title {
            color: var(--purple);
            font-family: Oswald;
            font-size: 24px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .recovery-subtitle {
            color: var(--gray);
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .recovery-field input {
            width: 100%;
            padding: 14px 18px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .recovery-field input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(143, 70, 255, 0.1);
        }
        .recovery-field input::placeholder {
            color: var(--gray);
        }
        .recovery-btn {
            width: 100%;
            padding: 14px;
            background: var(--purple);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: Bebas Neue;
            font-size: 20px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .recovery-btn:hover {
            background: var(--purple2);
            transform: translateY(-2px);
        }
        .recovery-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .recovery-links {
            text-align: center;
            margin-top: 15px;
        }
        .recovery-links a {
            color: var(--purple);
            text-decoration: none;
            font-size: 14px;
        }
        .recovery-links a:hover {
            text-decoration: underline;
        }
        .recovery-message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .recovery-message.success {
            color: var(--green);
        }
        .recovery-message.error {
            color: var(--red);
        }
        /* Кнопка темы */
        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle-btn:hover {
            border-color: var(--purple);
            background: var(--purple);
            transform: rotate(20deg);
        }

        .recovery-box h1 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Toast уведомления -->
    <div id="toastContainer"></div>
    <div class="recovery-page">
        <div class="recovery-container">
            <div class="recovery-box">
                <button class="theme-toggle-btn" id="themeToggle">🌙</button>
                <h1 class="auth-title">THE WOCKHARDT MANDEM</h1>
                <h2 class="recovery-title">Восстановление пароля</h2>
                <p class="recovery-subtitle">Введите ваш email для сброса пароля</p>
                
                <form id="recoveryForm">
                    <div class="recovery-field">
                        <input type="email" id="recoveryEmail" placeholder="Email" required>
                    </div>
                    
                    <button type="submit" class="recovery-btn" id="recoveryBtn">send a link</button>
                    
                    <div id="recoveryMessage" class="recovery-message"></div>
                </form>
                
                <div class="recovery-links">
                    <a href="./index.html">← Вернуться на главную</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
    </script>
    <script type="module" src="./js/config.js"></script>
    <script type="module" src="./js/theme.js"></script>
    <script type="module" src="./js/recovery.js"></script>
</body>
</html>
